  right:
    title: "Privacy policy"
questions:
    - title: "Who can apply for a postal vote?"
      answer: "Any person who is eligible to vote may vote by postal ballot instead of in person at the polling station without giving a reason."
    - title: "What are the deadlines?"
      answer: "Postal voting documents can be requested in advance, even if no election notification has been received yet. The Federal Returning Officer even recommends applying for postal voting as early as possible. As long as the postal ballot with the cast vote is received in time for election day, the vote will be counted. The postal ballot should be posted no later than the third working day before the election – usually the Thursday before the Sunday of the election. When voting by post from abroad, delivery takes longer, so this should be taken into account. Alternatively, the postal ballot can also be handed in at the location indicated on the postal ballot envelope. It must be received by the relevant authority by 6 p.m. on election Sunday at the latest. "
    - title: "When can I expect the documents?"
      answer: "The documents are usually sent a few working days after your application has been received by the electoral office. However, postal voting documents can only be sent out once the election proposals have been finally approved and the ballot papers have been printed, so not months in advance."
    - title: "Do I have to pay postage for the election letter?"
      answer: "No, within Germany election letters are delivered free of charge by Deutsche Post. When you vote by mail from abroad, the letter must be stamped accordingly."
    - title: "I will not be at my registered address. Can I have the documents sent to another address?"
      answer: "This is possible without any problems. However, the application for postal voting documents must contain the registration address. You can then request for the documents to be sent to another address."
    - title: "Do I have to wait for the election notification?"
      answer: "No, you don't have to, even though some online portals of the municipalities or Länder require the election notification for an online application for postal voting documents because they ask for the electoral roll number printed there. However, the informal application by e-mail to the electoral office of the main residence with the personal details is sufficient."
    - title: "Can I still vote at the polling station if I do not send the documents in time?"
      answer: "Yes, it is possible to vote at the polling station on election day even if you have applied for a postal vote. To do so, you must bring the polling card enclosed with the postal voting documents and photo ID to the polling station. Once you have applied for a polling card, you can only vote with this card, either by postal vote or on election day at any polling station in your constituency. No new voting documents will be issued at the polling station."
    - title: "Can I also post the ballot paper directly at the electoral office?"
      answer: "This is possible and makes sense if the absentee ballot papers are only filled in the day before or on the day of the election. The letter must be received by the electoral office by the time the polling stations close."
    - title: "What happens after I apply for an absentee ballot?"
      answer: "The postal voting documents will be sent to the address provided within a few working days."
