  subtitle: |
    <p>These elections will still take place in 2026:</p>
    <ul>
    <li>On 8 March 2026, there will be state elections in Baden-Württemberg.</li
    <li>On 22 March 2026, there will be state elections in Rhineland-Palatinate.</li>
    </ul>
    <p>
    Votes can be cast in advance by postal vote. It only takes 2 minutes to apply for the required documents by email.
    <br /><br />
