<div id="left-side" class="col-md-12 col-lg-6 background-primary pattern">
    <div class="container d-flex flex-column flex-fill h-100 py-5 px-2 px-lg-5">
        {% include navbar.html %}

        <div class="row">
            <div class="">
                <h1>{% t about.left.title %}</h1>
                <p class="subtitle">{% t about.left.subtitle %}</p>
            </div>
        </div>

        <div class="d-block d-lg-none mt-5 scrollIndicator">
            <div class="container">
                <div class="text-center">
                    <button onclick="window.scrollTo(0,document.body.scrollHeight);"><i
                            class="fas fa-2x fa-chevron-down"></i></button>
                </div>
            </div>
        </div>

        <div class="row mt-auto d-none d-lg-block">
            <div class="col-12">
                {% include nav.html %}
                {% include footer.html %}
            </div>
        </div>
    </div>
</div>
