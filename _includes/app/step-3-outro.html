<div id="outro-bottom" class="col-12 col-xl-8 my-4 p-4 outro">
    <h1 class="mb-3">{% t left.share %}</h1>
    <p class="mb-4">{% t left.description %}</p>
    <div>
        <a class="copy" data-clipboard-text="{% t right.sharing.copy %}" href="#"
            onclick="event.preventDefault();" data-bs-placement="bottom"
            data-bs-toggle="tooltip" title="{% t right.message.sharecopy %}"><i
                class="far fa-copy"></i></a>
        <a
            href="mailto:?subject={% t right.sharing.email.subject %}&amp;body={% t right.sharing.email.body %}"><i
                class="fas fa-envelope"></i></a>
        <a href="https://facebook.com/sharer/sharer.php?u={{ site.share_url }}"
            target="_blank" rel="noreferrer nopener"><i
                class="fa-brands fa-facebook"></i></a>
        <a href="https://bsky.app/intent/compose?text={% t right.sharing.bluesky %}"
            target="_blank" rel="noreferrer nopener"><i
                class="fa-brands fa-bluesky"></i></a>
        <a href="https://www.linkedin.com/sharing/share-offsite/?url={{ site.share_url }}"
            target="_blank" rel="noreferrer nopener"><i
                class="fa-brands fa-linkedin-in"></i></a>
        <a href="https://t.me/share/url?text={% t right.sharing.telegram %}&amp;url={{ site.share_url }}"
            target="_blank" rel="noreferrer nopener"><i
                class="fa-solid fa-paper-plane"></i></a>
        <a href="https://wa.me/?text={% t right.sharing.whatsapp %}" target="_blank"
            rel="noreferrer nopener"><i class="fa-brands fa-whatsapp"></i></a>

        <h3 class="mt-5 mb-3">{% t left.donateTitle %}</h3>
        <a class="donate" href="{{ site.donate_url }}">{% t left.donateButton %}</a>
    </div>
</div>
