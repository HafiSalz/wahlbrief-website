<div id="address-mobile">
    <div class="d-flex mb-3 justify-content-between align-items-center">
        <button class="btn back-small" onclick="backtofirstpage();">{% t right.back %}</button>
        <h4 class="fw-bold">2/3</h4>
    </div>
    <h2>{% t right.residence %}</h2>
    <p>{% t right.optional %}</p>
    <div class="background-white p-4">
        <h4 id="muniname" class="fw-bold mb-0"></h4>
        <p id="muniemail" class="mb-0 me-1 d-inline-block"></p>
        <button class="btn copy p-0 d-inline-block" data-bs-toggle="tooltip" data-bs-placement="top"
            title="{% t right.message.copied %}" data-clipboard-target="#muniemail">
            <i class="far fa-copy"></i>
        </button>
    </div>
</div>
