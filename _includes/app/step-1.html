<div class="tab-pane fade show active" id="step-1" role="tabpanel" aria-labelledby="step-1-tab">
    <div class="col-12">
        <h4 class="fw-bold float-end">1/3</h4>
        <h2>{% t right.zip %}</h2>
        <p>{% t right.description %}</p>
    </div>
    <div class="col-xl-10 col-12">
        <div class="input-group form-floating autocomplete mb-0 mb-lg-2">
            <input id="zipcode" type="text" name="zipcode" autocomplete="off"
                inputmode="numeric"
                onkeypress="return (event.charCode !=8 && event.charCode ==0 || (event.charCode >= 48 && event.charCode <= 57))"
                class="form-control" minlength="9" maxlength="120"
                placeholder="{% t right.placeholder %}" aria-label="{% t right.placeholder %}"
                aria-describedby="{% t right.placeholder %}">
            <label for="zipcode">{% t right.placeholder %}</label>

            <div class="input-group-append d-none d-xxl-inline-block">
                <button onclick="secondpage();" class="btn btn-new"><i
                        class="fas fa-search me-2"></i>{% t
                    right.button
                    %}</button>
            </div>
        </div>

        <div class="autocomplete-items" id="autocomplete-list">
        </div>

        <button id="next-click" onclick="secondpage();"
            class="btn btn-new mt-3 mg-lg-0 d-block w-100 d-xxl-none"><i
                class="fas fa-search me-2"></i>{% t
            right.button
            %}</button>

        <p class="mt-5">{% t right.tos %}</p>
    </div>
</div>
