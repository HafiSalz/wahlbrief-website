<form id="main-form" name="main" class="mt-4 mb-4">
    <div class="row">
        <div class="col-12 col-lg-6 mb-3 mb-lg-0">
            <div class="form-floating">
                <input type="text" class="form-control" id="form-name" maxlength="60"
                    placeholder="{% t right.firstname %}"
                    aria-label="{% t right.firstname %}"
                    aria-describedby="{% t right.firstname %}">
                <label for="form-name">{% t right.firstname %}</label>
            </div>
        </div>
        <div class="col-12 col-lg-6">
            <div class="form-floating">
                <input type="text" class="form-control" id="form-surname" maxlength="60"
                    placeholder="{% t right.lastname %}"
                    aria-label="{% t right.lastname %}"
                    aria-describedby="{% t right.lastname %}">
                <label for="form-surname">{% t right.lastname %}</label>
            </div>
        </div>
    </div>
    <fieldset id="birthday" class="mt-3 px-3">
        <legend>{% t right.birthday %}</legend>
        <div class="row my-2 gx-1">
            <div class="col-4 col-lg-4">
                <div class="form-floating">
                    <input type="text" class="form-control" id="form-day"
                        onkeypress="return (event.charCode !=8 && event.charCode ==0 || (event.charCode >= 48 && event.charCode <= 57))"
                        pattern="(0[1-9]|[12]\d|3[01])" inputmode="numeric"
                        minlength="1" maxlength="2" placeholder="{% t right.day %}"
                        aria-label="{% t right.day %}"
                        aria-describedby="{% t right.day %}">
                    <label for="form-day">{% t right.day %}</label>
                </div>
            </div>
            <div class="col-4 col-lg-4">
                <div class="form-floating">
                    <input type="text" class="form-control" id="form-month"
                        onkeypress="return (event.charCode !=8 && event.charCode ==0 || (event.charCode >= 48 && event.charCode <= 57))"
                        pattern="(0[1-9]|1[012])" inputmode="numeric" minlength="1"
                        maxlength="2" placeholder="{% t right.month %}"
                        aria-label="{% t right.month %}"
                        aria-describedby="{% t right.month %}">
                    <label for="form-month">{% t right.month %}</label>
                </div>
            </div>
            <div class="col-4 col-lg-4">
                <div class="form-floating">
                    <input type="text" class="form-control" id="form-year"
                        onkeypress="return (event.charCode !=8 && event.charCode ==0 || (event.charCode >= 48 && event.charCode <= 57))"
                        pattern="^((200[0-7])|(19[0-9]{2})|(189[0-9]))$"
                        inputmode="numeric" minlength="4" maxlength="4"
                        placeholder="{% t right.year %}" aria-label="{% t right.year %}"
                        aria-describedby="{% t right.year %}">
                    <label for="form-year">{% t right.year %}</label>
                </div>
            </div>
        </div>
    </fieldset>
    <div class="row mt-3">
        <div class="col-12 col-lg-12 mb-0">
            <div class="form-floating">
                <input type="text" class="form-control" id="form-street"
                    maxlength="60"
                    placeholder="{% t right.shipping.street %}"
                    aria-label="{% t right.shipping.street %}"
                    aria-describedby="{% t right.shipping.street %}">
                <label for="form-street">{% t right.shipping.street %}</label>
            </div>
        </div>
    </div>
    <div class="row mt-3">
        <div class="col-12 col-md-4 mb-3 mb-lg-0">
            <div class="form-floating">
                <input type="text" class="form-control"
                    onkeypress="return (event.charCode !=8 && event.charCode ==0 || (event.charCode >= 48 && event.charCode <= 57))"
                    id="form-zip" inputmode="numeric" minlength="5" maxlength="5"
                    pattern="[0-9]{5}" placeholder="{% t right.shipping.zipcode %}"
                    aria-label="{% t right.shipping.zipcode %}"
                    aria-describedby="{% t right.shipping.zipcode %}">
                <label for="form-zip">{% t right.shipping.zipcode %}</label>
            </div>
        </div>
        <div class="col-12 col-md-8">
            <div class="form-floating">
                <input type="text" class="form-control" id="form-city" minlength="2"
                    maxlength="60" placeholder="{% t right.shipping.city %}"
                    aria-label="{% t right.shipping.city %}"
                    aria-describedby="{% t right.shipping.city %}">
                <label for="form-city">{% t right.shipping.city %}</label>
            </div>
        </div>
    </div>

    <div class="mt-3 form-check d-none d-lg-block">
        <input class="form-check-input" type="radio" name="sameaddress" id="sameaddress"
            value="normal" checked>
        <label class="form-check-label" for="sameaddress">
            {% t right.same-address %}
        </label>
    </div>
    <div class="form-check d-none d-lg-block">
        <input class="form-check-input" type="radio" name="sameaddress"
            id="differentaddress" value="different">
        <label class="form-check-label" for="differentaddress">
            {% t right.different-address %}
        </label>
    </div>
    <div
        class="d-flex justify-content-between align-items-center d-block d-lg-none mt-3">
        <p class="mb-0">{% t right.checkbox-address %}</p>
        <div>
            <input class="tgl tgl-light" id="cb1" type="checkbox" />
            <label class="tgl-btn" for="cb1"></label>
        </div>
    </div>
    <div class="col-10 d-block d-lg-none">
        <p class="small text-muted">{% t right.checkbox-description %}</p>
    </div>
    {% include app/step-2-alternative-address.html %}

    <div id="election-hints" class="background-gray-100 py-3 px-3 my-3">
        <div class="d-flex align-items-center justify-content-lg-start">
            <div id="election-hint-normal" class="election-hint">
                <p class="mb-0">
                    <i class="fas fa-info-circle color-secondary me-2"></i>
                    {% t right.arrival %} <strong id="arrival-date"></strong>
                </p>
            </div>
            <div id="election-hint-late" class="election-hint">
                <p class="mb-0">
                    <i class="fas fa-exclamation-circle text-danger me-2"></i>
                    {% t right.arrivallate %}
                </p>
            </div>
            <div id="election-hint-none" class="election-hint">
                <p class="mb-0">
                    <i class="fas fa-exclamation-circle text-danger me-2"></i>
                    {% t right.noelections %} <strong id="arrival-date"></strong>
                </p>
            </div>
        </div>
    </div>

    <div class="row mt-3">
        <div class="col-12">
            <h4>{% t right.email-reminder %}</h4>
            <p class="mb-1">{% t right.email-reminder-description %}</p>

            <div class="form-floating">
                <input type="email" name="email" class="form-control" id="email"
                    placeholder="{% t right.email %}" aria-label="{% t right.email %}"
                    aria-describedby="{% t right.email %}">
                <label for="email">{% t right.email %}</label>
            </div>

            <div class="form-check mt-2">
                <input class="form-check-input" type="checkbox" name="emailNewsletter"
                    id="email-newsletter" value="normal">
                <label class="form-check-label" for="email-newsletter">
                    {% t right.email-newsletter %}
                </label>
            </div>
        </div>
    </div>

    <div class="row mt-4">
        <div class="col-12 d-flex justify-content-end">
            <button class="btn btn-primary btn-lg" type="submit">
                <i class="fas fa-eye me-2"></i>
                {% t right.preview %}
            </button>
        </div>
    </div>
</form>
