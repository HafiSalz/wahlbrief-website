<div class="tab-pane fade show active sachsen-step sachsen-step-1" id="step-1" role="tabpanel" aria-labelledby="step-1-tab">
    <div class="col-12 sachsen-step-intro">
        <div class="sachsen-step-header">
            <div class="dropdown sachsen-language-switcher">
                <button class="dropdown-toggle" type="button" id="sachsenLanguageMenu"
                    data-bs-toggle="dropdown" aria-expanded="false">
                    <i class="fas fa-globe me-1"></i>
                    {% for lang in site.languages %}
                    {% assign lang_name = site.data[lang].l10n.lang_name %}
                    {% if lang == site.lang %}
                    {{ lang_name }}
                    {% endif %}
                    {% endfor %}
                </button>
                <ul class="dropdown-menu" aria-labelledby="sachsenLanguageMenu">
                    {% for lang in site.languages %}
                    {% assign lang_name = site.data[lang].l10n.lang_name %}
                    {% if lang == site.default_lang %}
                    <li><a class="dropdown-item" href="{{ site.baseurl_root }}{{ page.url }}">{{ lang_name }}</a></li>
                    {% else %}
                    <li><a class="dropdown-item" href="{{ site.baseurl_root }}/{{ lang }}{{ page.url }}">{{ lang_name }}</a></li>
                    {% endif %}
                    {% endfor %}
                </ul>
            </div>
            <h4 class="fw-bold mb-0">1/3</h4>
        </div>
        <h2>Zuständiges<br>Wahlamt suchen</h2>
        <p>{% t right.description %}</p>
    </div>
    <div class="col-xl-10 col-12 sachsen-step-controls">
        <div class="input-group form-floating autocomplete mb-0 mb-lg-2">
            <input id="zipcode" type="text" name="zipcode" autocomplete="off"
                inputmode="numeric"
                onkeypress="return (event.charCode !=8 && event.charCode ==0 || (event.charCode >= 48 && event.charCode <= 57))"
                class="form-control" minlength="9" maxlength="120"
                placeholder="{% t right.placeholder %}" aria-label="{% t right.placeholder %}"
                aria-describedby="{% t right.placeholder %}">
            <label for="zipcode">{% t right.placeholder %}</label>

            <div class="input-group-append d-none d-xxl-inline-block">
                <button onclick="secondpage();" class="btn btn-new"><i
                        class="fas fa-search me-2"></i>{% t
                    right.button
                    %}</button>
            </div>
        </div>

        <div class="autocomplete-items" id="autocomplete-list">
        </div>

        <button id="next-click" onclick="secondpage();"
            class="btn btn-new mt-3 mg-lg-0 d-block w-100 d-xxl-none"><i
                class="fas fa-search me-2"></i>{% t
            right.button
            %}</button>

        <p class="mt-5">{% t right.tos %}</p>
    </div>
</div>
